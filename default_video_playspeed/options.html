<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin: 15px 0 10px 0;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3);
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .preset-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .preset-btn:hover {
            background: rgba(245, 158, 11, 0.3);
            border-color: #f59e0b;
            transform: translateY(-2px);
        }

        .preset-btn.active {
            background: #f59e0b;
            border-color: #f59e0b;
            color: #1e3a8a;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #f59e0b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        button:hover {
            background: #d97706;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: #6366f1;
            margin-top: 5px;
            padding: 8px;
            font-size: 0.85rem;
        }

        button.secondary:hover {
            background: #4f46e5;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            min-height: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .info-text {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Main Settings Card -->
        <div class="card">
            <h2>Default Speed Settings</h2>

            <div class="setting-group">
                <label for="speed">Default Playback Speed (0.25 - 5.0)</label>
                <input type="number" id="speed" step="0.25" min="0.25" max="5.0" value="1.25">
                <div class="info-text">Applied to all videos by default</div>
            </div>

            <div class="setting-group">
                <h3>Quick Presets</h3>
                <div class="preset-buttons">
                    <button class="preset-btn" data-speed="0.75">0.75x</button>
                    <button class="preset-btn" data-speed="1.0">1.0x</button>
                    <button class="preset-btn" data-speed="1.25">1.25x</button>
                    <button class="preset-btn" data-speed="1.5">1.5x</button>
                    <button class="preset-btn" data-speed="2.0">2.0x</button>
                </div>
            </div>

            <button id="save">Save Settings</button>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script src="options.js"></script>
</body>

</html>
