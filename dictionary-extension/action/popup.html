<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dictionary</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <main class="toolbar-popup">
        <header class="toolbar-popup-header">
            <div>
                <p class="toolbar-popup-eyebrow">Dictionary</p>
                <h1>Look up a word</h1>
            </div>
        </header>

        <form class="toolbar-popup-search" id="lookup-form">
            <label class="sr-only" for="lookup-input">Word or phrase</label>
            <input id="lookup-input" name="query" type="text" placeholder="Type a word or phrase" autocomplete="off"
                spellcheck="false">
            <button type="submit">Search</button>
        </form>

        <div class="toolbar-popup-tabs" id="tabs"></div>
        <section class="toolbar-popup-body" id="result" aria-live="polite"></section>
    </main>

    <script type="module" src="popup.js"></script>
</body>

</html>
